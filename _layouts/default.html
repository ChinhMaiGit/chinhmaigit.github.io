<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <!-- Anti-FOUC: apply theme (.dark class) before first paint. First visit
         respects the OS setting; after that the stored toggle choice wins. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.classList.toggle('dark', t === 'dark');
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
  </head>
  <body>

    <!-- Living backdrop: drifting gradient blobs the glass cards reveal -->
    <div class="bg-blobs" aria-hidden="true">
      <span class="bg-blob bg-blob--orange"></span>
      <span class="bg-blob bg-blob--sky"></span>
      <span class="bg-blob bg-blob--emerald"></span>
    </div>

    <div class="layout page-enter">

      <aside class="sidebar">
        <div class="sidebar__inner">
          {% if site.logo %}
            <img class="sidebar__avatar" src="{{ site.logo | relative_url }}" alt="{{ site.title }}">
          {% endif %}

          <h1 class="sidebar__name">{{ site.title | default: site.github.repository_name }}</h1>
          <p class="sidebar__role">BI Engineer</p>

          <div class="sidebar__bio">{{ site.description | default: site.github.project_tagline }}</div>

          <nav class="nav">
            <a href="#about">About</a>
            <a href="#featured">Featured</a>
            <a href="#excel">Excel</a>
            <a href="#python">Python</a>
            <a href="#sql">SQL</a>
            <a href="#powerbi">Power BI</a>
          </nav>

          {% if site.github.is_user_page %}
            <a class="sidebar__cta" href="{{ site.github.owner_url }}">View GitHub Profile</a>
          {% endif %}

          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme">🌙 Dark</button>
        </div>
      </aside>

      <main class="content">
        {{ content }}
      </main>

    </div>

    <script>
      /* Cursor spotlight: write pointer position into the hovered card. */
      (function () {
        var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (reduce) return;
        document.addEventListener('pointermove', function (e) {
          var card = e.target.closest && e.target.closest('.card');
          if (!card) return;
          var r = card.getBoundingClientRect();
          card.style.setProperty('--mx', (e.clientX - r.left) + 'px');
          card.style.setProperty('--my', (e.clientY - r.top) + 'px');
        });
      })();

      /* Theme toggle with circle-reveal (View Transitions API) when available. */
      (function () {
        var btn = document.getElementById('theme-toggle');
        if (!btn) return;
        var root = document.documentElement;
        function isDark() { return root.classList.contains('dark'); }
        function render() { btn.textContent = isDark() ? '☀ Light' : '🌙 Dark'; }
        render();

        function apply(next) {
          root.classList.toggle('dark', next === 'dark');
          try { localStorage.setItem('theme', next); } catch (e) {}
          render();
        }

        btn.addEventListener('click', function (e) {
          var next = isDark() ? 'light' : 'dark';
          var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

          if (!document.startViewTransition || reduce) { apply(next); return; }

          var x = e.clientX, y = e.clientY;
          var endRadius = Math.hypot(Math.max(x, innerWidth - x), Math.max(y, innerHeight - y));
          var tr = document.startViewTransition(function () { apply(next); });
          tr.ready.then(function () {
            root.animate(
              { clipPath: ['circle(0px at ' + x + 'px ' + y + 'px)',
                           'circle(' + endRadius + 'px at ' + x + 'px ' + y + 'px)'] },
              { duration: 700, easing: 'ease-in-out', pseudoElement: '::view-transition-new(root)' }
            );
          });
        });
      })();
    </script>
  </body>
</html>
